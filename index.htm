f(r.status===204||m==='DELETE')return null;return r.json()}async function loadD(){try{const d=await sb('/rest/v1/documents?select=*&order=date.desc');docs=Array.isArray(d)?d:[];document.getElementById('badge').textContent=docs.length+' doc'+(docs.length!==1?'s':'');render()}catch{toast('Erreur connexion',1)}}function go(n){[0,1,2].forEach(i=>{document.getElementById('p'+i).classList.toggle('on',i===n);document.getElementById('t'+i).classList.toggle('on',i===n)});if(n===1)loadD()}function render(){const q=(document.getElementById('fs').value||'').toLowerCase();const f=docs.filter(d=>!q||d.title.toLowerCase().includes(q)||d.content.toLowerCase().includes(q));const l=document.getElementById('dl');if(!f.length){l.innerHTML='<div class="nodoc">'+(docs.length===0?'Aucun document':'Aucun résultat')+'</div>';return}l.innerHTML=f.map(d=>{const c=C[d.cat]||C.autre;const dt=new Date(d.date).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'});return<div class="dcard"><div class="dic">${c.i}</div><div class="din"><div class="dtt">${esc(d.title)}</div><div class="dmt">${c.l} · ${dt}</div></div><span class="cpill" style="background:${c.bg};color:${c.fg}">${c.l}</span><button class="bdel" onclick="del('${d.id}')">✕</button></div>}).join('')}async function del(id){if(!confirm('Supprimer ?'))return;try{await sb('/rest/v1/documents?id=eq.'+id,'DELETE');docs=docs.filter(d=>d.id!==id);document.getElementById('badge').textContent=docs.length+' doc'+(docs.length!==1?'s':'');render();toast('Supprimé ✓')}catch{toast('Erreur',1)}}async function addD(){const t=document.getElementById('dt').value.trim(),c=document.getElementById('dc').value,ct=document.getElementById('dct').value.trim();if(!t){toast('Titre manquant',1);return}if(!ct){toast('Contenu manquant',1);return}const b=document.getElementById('badd'),l=document.getElementById('addl');b.disabled=1;l.innerHTML='<span class="sp"></span> Envoi…';try{await sb('/rest/v1/documents','POST',{title:t,cat:c,content:ct});docume t.textContent='⚠️ Erreur connexion.'}finally{b.disabled=0;l.textContent='Rechercher'}}function showA(t){document.getElementById('hint').style.display='none';document.getElementById('abox').classList.add('on');document.getElementById('atxt').textContent=t}function toast(m,e){const t=document.getElementById('toast');t.textContent=m;t.className='toast on'+(e?' err':'');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),3400)}function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ask()}});loadD();</script></body></html>
